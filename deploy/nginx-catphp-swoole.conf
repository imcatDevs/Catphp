server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name catphp.imcat.dev;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/catphp.imcat.dev/Public;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/catphp.imcat.dev.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/catphp.imcat.dev/*.conf;

    #SSL-START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/catphp.imcat.dev/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/catphp.imcat.dev/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497  https://$host$request_uri;
    #SSL-END

    # 금지 경로
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md|server\.php|cli\.php|config/|catphp/|routes/|storage/|migrations/)
    {
        return 404;
    }

    # SSL 검증
    location ~ \.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # 정적 자원 캐시 (Public/ 에서 직접 서빙)
    location ~* \.(gif|jpg|jpeg|png|bmp|svg|webp|ico|woff2?|ttf|eot)$
    {
        expires 30d;
        access_log off;
        try_files $uri @swoole;
    }

    location ~* \.(js|css|map)$ {
        expires 12h;
        access_log off;
        try_files $uri @swoole;
    }

    # CatPHP Swoole 프록시 — 모든 동적 요청
    location / {
        try_files $uri @swoole;
    }

    location @swoole {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    access_log  /www/wwwlogs/catphp.imcat.dev.log;
    error_log  /www/wwwlogs/catphp.imcat.dev.error.log;
}
